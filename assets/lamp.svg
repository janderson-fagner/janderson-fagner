<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 290" width="150" height="197" role="img" aria-label="Lâmpada da A23 acendendo">
  <defs>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e23a52"/>
      <stop offset="1" stop-color="#a3122c"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <!-- padrão de flicker: pisca 3x rápido e fica aceso o resto do ciclo -->
  </defs>

  <!-- halo/glow que acende junto -->
  <circle cx="104" cy="98" r="86" fill="#e23a52" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" dur="4s" repeatCount="indefinite"
      keyTimes="0;0.06;0.10;0.16;0.21;0.28;0.72;0.95;1"
      values="0;0.9;0.12;0.9;0.18;0.85;0.85;0.85;0"/>
  </circle>

  <!-- corpo da lâmpada (bulbo em 'a' + furo + filamento) -->
  <g>
    <animate attributeName="opacity" dur="4s" repeatCount="indefinite"
      keyTimes="0;0.06;0.10;0.16;0.21;0.28;0.72;0.95;1"
      values="0.32;1;0.4;1;0.42;1;1;1;0.32"/>

    <!-- bulbo: círculo com lado inferior-direito reto, evocando o 'a' da marca -->
    <path fill="url(#red)" d="M104 18
      C57 18 18 57 18 104
      C18 151 57 190 104 190
      L152 190
      C163 190 172 181 172 170
      L172 104
      C172 57 151 18 104 18 Z"/>

    <!-- furo do 'a' (a lente da lâmpada) -->
    <circle cx="96" cy="86" r="30" fill="#fafaf8"/>

    <!-- filamento / rosca -->
    <rect x="74"  y="202" width="60" height="11" rx="4" fill="url(#red)"/>
    <rect x="79"  y="219" width="50" height="11" rx="4" fill="url(#red)"/>
    <rect x="84"  y="236" width="40" height="11" rx="4" fill="url(#red)"/>
    <path fill="url(#red)" d="M90 253 h28 l-7 15 h-14 Z"/>
  </g>
</svg>
